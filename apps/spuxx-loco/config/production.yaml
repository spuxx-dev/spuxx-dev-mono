# Loco configuration file documentation
# See: https://github.com/loco-rs/loco/blob/master/src/config.rs

logger:
  enable: true
  pretty_backtrace: true
  level: info
  format: json

server:
  port: 5150
  binding: localhost
  host: http://localhost
  middlewares:
    fallback:
      enable: false

smtp:
  enable: false
